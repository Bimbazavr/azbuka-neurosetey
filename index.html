// Auth modal — login / register
const Auth = ({ mode, setMode, onClose, onLogin }) => {
  const [form, setForm] = React.useState({ name: '', email: '', password: '', role: 'student' });
  const [errors, setErrors] = React.useState({});
  const [loading, setLoading] = React.useState(false);

  const validate = () => {
    const e = {};
    if (mode === 'register' && !form.name.trim()) e.name = 'Введите имя';
    if (!form.email.includes('@')) e.email = 'Некорректный email';
    if (form.password.length < 6) e.password = 'Минимум 6 символов';
    return e;
  };

  const submit = (e) => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) {setErrors(errs);return;}
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      onLogin({ name: form.name || form.email.split('@')[0], type: form.role, email: form.email });
      onClose();
    }, 800);
  };

  const field = (id, label, type = 'text', placeholder = '') =>
  <div style={authStyles.field}>
      <label style={authStyles.label}>{label}</label>
      <input
      type={type}
      placeholder={placeholder}
      value={form[id]}
      onChange={(e) => {setForm({ ...form, [id]: e.target.value });setErrors({ ...errors, [id]: '' });}}
      style={{ ...authStyles.input, ...(errors[id] ? authStyles.inputError : {}) }} />
    
      {errors[id] && <div style={authStyles.errorMsg}>{errors[id]}</div>}
    </div>;


  return (
    <div style={authStyles.overlay} onClick={onClose}>
      <div style={authStyles.modal} onClick={(e) => e.stopPropagation()}>
        <button style={authStyles.close} onClick={onClose}>✕</button>

        <div style={authStyles.logoArea}>
          <div style={authStyles.logoIcon}>А</div>
          <div style={authStyles.logoText}>Азбука нейросетей</div>
        </div>

        <div style={authStyles.tabs}>
          {['login', 'register'].map((m) =>
          <button key={m} style={{ ...authStyles.tab, ...(mode === m ? authStyles.tabActive : {}) }}
          onClick={() => {setMode(m);setErrors({});}}>
              {m === 'login' ? 'Войти' : 'Регистрация'}
            </button>
          )}
        </div>

        <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
          {mode === 'register' && field('name', 'Имя', 'text', 'Ваше имя')}
          {field('email', 'Email', 'email', 'example@mail.ru')}
          {field('password', 'Пароль', 'password', '••••••••')}

          {mode === 'register' &&
          <div style={authStyles.field}>
              <label style={authStyles.label}>Я регистрируюсь как</label>
              <div style={authStyles.roleRow}>
                {[['student', '🎓 Ученик'], ['teacher', '🧑‍🏫 Преподаватель']].map(([val, lbl]) =>
              <button key={val} type="button" style={{
                ...authStyles.roleBtn,
                ...(form.role === val ? authStyles.roleBtnActive : {})
              }} onClick={() => setForm({ ...form, role: val })}>{lbl}</button>
              )}
              </div>
            </div>
          }

          <button type="submit" style={authStyles.submit} disabled={loading}>
            {loading ? 'Загрузка...' : mode === 'login' ? 'Войти' : 'Создать аккаунт'}
          </button>
        </form>

        {mode === 'login' &&
        <div style={authStyles.hint}>
            Нет аккаунта? <button style={authStyles.hintBtn} onClick={() => setMode('register')}>Зарегистрироваться</button>
          </div>
        }
        {mode === 'register' &&
        <div style={authStyles.hint}>
            Уже есть аккаунт? <button style={authStyles.hintBtn} onClick={() => setMode('login')}>Войти</button>
          </div>
        }

        <div style={authStyles.divider}><span>или</span></div>
        <button style={authStyles.yandexBtn} onClick={() => {
          onLogin({ name: mode === 'register' ? form.name || 'Пользователь' : 'Пользователь', type: form.role || 'student', email: 'ya@yandex.ru' });
          onClose();
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{ marginRight: 8 }}>
            <circle cx="12" cy="12" r="12" fill="#FC3F1D" />
            <text x="12" y="17" textAnchor="middle" fill="white" fontSize="14" fontWeight="bold" fontFamily="Arial">Я</text>
          </svg>
          Войти через Яндекс ID
        </button>
      </div>
    </div>);

};

// Catalog page — filters + workshop grid
const WORKSHOPS_DATA = window.AZBUKA.workshopsAll;


const Catalog = ({ setPage, setAuthModal, currentUser }) => {
  const [filters, setFilters] = React.useState({ tag: '', level: '', format: '', maxPrice: 5000, search: '' });
  const [sort, setSort] = React.useState('date');
  const [savedIds, setSavedIds] = React.useState([]);

  const tags = ['Бизнес', 'Дизайн', 'Контент', 'Технологии', 'Образование'];
  const levels = ['Начинающий', 'Продвинутый'];
  const formats = ['Онлайн'];

  const filtered = WORKSHOPS_DATA.
  filter((w) => (!filters.tag || w.tag === filters.tag) && (
  !filters.level || w.level === filters.level) && (
  !filters.format || w.format === filters.format) &&
  w.price <= filters.maxPrice && (
  !filters.search || w.title.toLowerCase().includes(filters.search.toLowerCase()))
  ).
  sort((a, b) => sort === 'price' ? a.price - b.price : sort === 'seats' ? a.seats - b.seats : 0);

  const toggleSave = (id, e) => {
    e.stopPropagation();
    setSavedIds((s) => s.includes(id) ? s.filter((x) => x !== id) : [...s, id]);
  };

  const filterChip = (key, val, label) =>
  <button key={val} style={{
    ...catStyles.chip,
    ...(filters[key] === val ? catStyles.chipActive : {})
  }} onClick={() => setFilters((f) => ({ ...f, [key]: f[key] === val ? '' : val }))}>
      {label}
    </button>;


  return (
    <div style={catStyles.page}>
      <div style={catStyles.header}>
        <div style={catStyles.headerInner}>
          <h1 style={catStyles.h1}>Воркшопы</h1>
          <p style={catStyles.sub}>Живые занятия с практическим результатом</p>
        </div>
      </div>

      <div style={catStyles.body}>
        {/* Sidebar filters */}
        <aside style={catStyles.sidebar}>
          <div style={catStyles.filterBlock}>
            <div style={catStyles.filterTitle}>Поиск</div>
            <input
              placeholder="Название воркшопа..."
              value={filters.search}
              onChange={(e) => setFilters((f) => ({ ...f, search: e.target.value }))}
              style={catStyles.searchInput} />
            
          </div>
          <div style={catStyles.filterBlock}>
            <div style={catStyles.filterTitle}>Тема</div>
            <div style={catStyles.chipsRow}>
              {tags.map((t) => filterChip('tag', t, t))}
            </div>
          </div>
          <div style={catStyles.filterBlock}>
            <div style={catStyles.filterTitle}>Уровень</div>
            <div style={catStyles.chipsRow}>
              {levels.map((l) => filterChip('level', l, l))}
            </div>
          </div>
          <div style={catStyles.filterBlock}>
            <div style={catStyles.filterTitle}>Стоимость до: <strong style={{ color: '#7C6FCD' }}>{filters.maxPrice.toLocaleString()} ₽</strong></div>
            <input type="range" min={1000} max={10000} step={500}
            value={filters.maxPrice}
            onChange={(e) => setFilters((f) => ({ ...f, maxPrice: +e.target.value }))}
            style={{ width: '100%', accentColor: '#7C6FCD' }} />
            
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: '#c0bad8' }}>
              <span>1 000 ₽</span><span>10 000 ₽</span>
            </div>
          </div>
          {(filters.tag || filters.level || filters.maxPrice < 5000 || filters.search) &&
          <button style={catStyles.clearBtn} onClick={() => setFilters({ tag: '', level: '', format: '', maxPrice: 5000, search: '' })}>
              Сбросить фильтры ✕
            </button>
          }
        </aside>

        {/* Main grid */}
        <main style={catStyles.main}>
          <div style={catStyles.sortRow}>
            <span style={{ fontSize: 14, color: '#9990b0' }}>Найдено: <strong style={{ color: '#2D2640' }}>{filtered.length}</strong></span>
            <div style={{ display: 'flex', gap: 8 }}>
              {[['date', 'По дате'], ['price', 'По цене'], ['seats', 'По местам']].map(([v, l]) =>
              <button key={v} style={{ ...catStyles.sortBtn, ...(sort === v ? catStyles.sortBtnActive : {}) }}
              onClick={() => setSort(v)}>{l}</button>
              )}
            </div>
          </div>

          {filtered.length === 0 ?
          <div style={catStyles.empty}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>🔍</div>
              <div style={{ fontWeight: 700, color: '#2D2640', marginBottom: 8 }}>Ничего не найдено</div>
              <div style={{ color: '#9990b0', fontSize: 14 }}>Попробуй изменить фильтры</div>
            </div> :

          <div style={catStyles.grid}>
              {filtered.map((w) =>
            <div key={w.id} style={catStyles.card} onClick={() => setPage('workshop-' + w.id)}>
                  <div style={catStyles.cardTop}>
                    <span style={{ fontSize: 40 }}>{w.emoji}</span>
                    <button style={{ ...catStyles.saveBtn, color: savedIds.includes(w.id) ? '#F5856A' : '#c0bad8' }}
                onClick={(e) => toggleSave(w.id, e)}>
                      {savedIds.includes(w.id) ? '♥' : '♡'}
                    </button>
                  </div>
                  <div style={{ display: 'flex', gap: 6, marginBottom: 10 }}>
                    <span style={catStyles.tag}>{w.tag}</span>
                    <span style={{ ...catStyles.tag, background: '#fff0eb', color: '#F5856A' }}>{w.level}</span>
                  </div>
                  <h3 style={catStyles.cardTitle}>{w.title}</h3>
                  <p style={catStyles.cardDesc}>{w.desc}</p>
                  <div style={catStyles.cardMeta}>
                    <span>📅 {w.date}</span>
                    <span>⏱ {w.duration}</span>
                    <span>👩‍🏫 {w.teacher}</span>
                  </div>
                  <div style={catStyles.cardFooter}>
                    <div>
                      <div style={catStyles.price}>{w.price.toLocaleString()} ₽</div>
                      <div style={{ fontSize: 12, color: w.seats <= 3 ? '#F5856A' : '#9990b0', fontWeight: 600 }}>
                        {w.seats <= 3 ? `🔥 ${w.seats} места` : `👥 ${w.seats} мест`}
                      </div>
                    </div>
                    <button style={catStyles.enroll} onClick={(e) => {e.stopPropagation();setAuthModal('register');}}>
                      Записаться
                    </button>
                  </div>
                </div>
            )}
            </div>
          }
        </main>
      </div>
    </div>);

};

        body: JSON.stringify({
          _subject: `Заявка: ${w?.title}`,
          Имя: form.name,
          Контакт: form.contact,
          Воркшоп: w?.title,
          Дата: (w?.date || '') + (w?.time ? ' ' + w.time : ''),
          Сумма: (w?.price?.toLocaleString() || '') + ' ₽',
          _captcha: 'false'
        })
      });
    } catch (_) {}
    setLoading(false);
    setStep(2);
  };

  if (step === 3) return (
    <div style={authStyles.overlay} onClick={onClose}>
      <div style={{ ...authStyles.modal, textAlign: 'center' }} onClick={(e) => e.stopPropagation()}>
        <div style={{ fontSize: 64, marginBottom: 16 }}>🎉</div>
        <h2 style={{ fontSize: 24, fontWeight: 800, color: '#2D2640', marginBottom: 8 }}>Спасибо!</h2>

        </div>
        <button style={{ ...authStyles.submit, marginTop: 0 }} onClick={onClose}>Закрыть</button>
      </div>
    </div>);

  if (step === 2) return (
    <div style={authStyles.overlay} onClick={onClose}>
      <div style={{ ...authStyles.modal, maxWidth: 460 }} onClick={(e) => e.stopPropagation()}>
        <button style={authStyles.close} onClick={onClose}>✕</button>
        <h2 style={{ fontSize: 20, fontWeight: 800, color: '#2D2640', marginBottom: 4 }}>Оплата через СБП</h2>
        <p style={{ fontSize: 14, color: '#9990b0', marginBottom: 20 }}>Переведите оплату по реквизитам ниже</p>
        <div style={{ background: '#f7f5ff', borderRadius: 16, padding: 20, marginBottom: 16 }}>
          {[
            ['📱 Телефон', sbp.phone],
            ['👤 Получатель', sbp.recipientName],
            ['🏦 Банк', sbp.bank],
            ['💰 Сумма', `${w?.price?.toLocaleString()} ₽`],
            ['💬 Комментарий', `${w?.title} — ${form.name}`]
          ].map(([label, value]) =>
            <div key={label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid #ede9ff' }}>
              <span style={{ fontSize: 13, color: '#9990b0' }}>{label}</span>
              <span style={{ fontSize: 14, fontWeight: 700, color: '#2D2640', textAlign: 'right', maxWidth: '60%' }}>{value}</span>
            </div>
          )}
        </div>
        <div style={{ background: '#fff8f0', borderRadius: 12, padding: 12, marginBottom: 20, fontSize: 13, color: '#b86a30' }}>
          💡 В комментарии к переводу напишите ваше имя — так мы сразу найдём вашу заявку
        </div>
        <button style={authStyles.submit} onClick={() => setStep(3)}>✅ Я оплатил(а)</button>
        <div style={{ textAlign: 'center', marginTop: 12, fontSize: 12, color: '#c0bad8' }}>
          Свяжемся с {form.contact} в течение нескольких часов
        </div>
      </div>
    </div>);

  return (
    <div style={authStyles.overlay} onClick={onClose}>
      <div style={{ ...authStyles.modal, maxWidth: 460 }} onClick={(e) => e.stopPropagation()}>
        <button style={authStyles.close} onClick={onClose}>✕</button>
        <h2 style={{ fontSize: 20, fontWeight: 800, color: '#2D2640', marginBottom: 4 }}>Записаться на воркшоп</h2>

              <div style={{ fontWeight: 700, color: '#2D2640', fontSize: 15 }}>{w?.emoji} {w?.title}</div>
              <div style={{ fontSize: 12, color: '#9990b0' }}>📅 {w?.date}{w?.time ? ' · ⏰ ' + w.time : ''} · 👩‍🏫 {w?.teacher}</div>
            </div>
            <div style={{ fontSize: 22, fontWeight: 800, color: '#7C6FCD' }}>{w?.price?.toLocaleString()} ₽</div>
          </div>
        </div>
        <form onSubmit={submit}>
          <div style={authStyles.field}>
            <label style={authStyles.label}>Ваше имя</label>

    workshop: {
      title: saved0?.workshop?.title || '',

  const tryLogin = () => {
    if (pw === password) { localStorage.setItem('az_admin_auth', password); setAuthed(true); }

  const handleSave = () => {

        onChange={(e) => setter(type === 'number' ? Number(e.target.value) : e.target.value)} />
    </div>);

  return (
    <div style={{ minHeight: '100vh', background: '#faf9ff', padding: '40px 16px' }}>
      <div style={{ maxWidth: 600, margin: '0 auto' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 32 }}>
          <div style={{ width: 40, height: 40, borderRadius: 12, background: 'linear-gradient(135deg,#7C6FCD,#9B8FE0)', color: 'white', fontWeight: 800, fontSize: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>А</div>
          <div>
            <div style={{ fontWeight: 800, fontSize: 20, color: '#2D2640' }}>Панель управления</div>

        <div style={{ background: 'white', borderRadius: 20, padding: 28, boxShadow: '0 4px 24px rgba(124,111,205,0.08)', marginBottom: 20 }}>
          <div style={{ fontWeight: 800, fontSize: 16, color: '#2D2640', marginBottom: 20 }}>📅 Ближайший воркшоп</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 100px', gap: '0 12px' }}>

            <F label="Эмодзи" value={data.workshop.emoji} setter={(v) => setW('emoji', v)} placeholder="🚀" />

// Main App — routing + global state
const getHashPage = () => {
  const h = window.location.hash.replace('#', '').trim();
  return h || 'landing';
};

const App = () => {
  const [page, setPageRaw] = React.useState(getHashPage);
  const [currentUser, setCurrentUser] = React.useState(() => {
    try {return JSON.parse(localStorage.getItem('az_user'));} catch {return null;}
  });
  const [authModal, setAuthModal] = React.useState(null); // null | 'login' | 'register'
  const [authMode, setAuthMode] = React.useState('login');
  const [paymentWorkshop, setPaymentWorkshop] = React.useState(null);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [heroVariant, setHeroVariant] = React.useState(() => parseInt(localStorage.getItem('az_hero') || '1'));
  const [font, setFont] = React.useState(() => localStorage.getItem('az_font') || 'Nunito');

  const [adminData, setAdminData] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('az_admin_data')); } catch { return null; }
  });

  const setPage = (p) => {
    setPageRaw(p);
    window.location.hash = p === 'landing' ? '' : p;
    window.scrollTo({ top: 0 });
  };

  // Слушаем браузерную кнопку «Назад»
  React.useEffect(() => {
    const onHash = () => setPageRaw(getHashPage());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const handleLogin = (user) => {
    setCurrentUser(user);
    localStorage.setItem('az_user', JSON.stringify(user));
  };

  const handleLogout = () => {
    setCurrentUser(null);
    localStorage.removeItem('az_user');
  };

  // Tweaks listener
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setHero = (v) => {
    setHeroVariant(v);
    localStorage.setItem('az_hero', v);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { heroVariant: v } }, '*');
  };

  const setFontChoice = (f) => {
    setFont(f);
    localStorage.setItem('az_font', f);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { font: f } }, '*');
    document.documentElement.style.fontFamily = f + ', sans-serif';
  };

  // Open auth modal handler
  const openAuth = (mode) => {
    setAuthMode(mode);
    setAuthModal(mode);
  };

  // Derive workshopId from page like 'workshop-1'
  const workshopId = page.startsWith('workshop-') ? parseInt(page.split('-')[1]) : null;

  if (page === 'admin') return (
    <div style={{ fontFamily: font + ', sans-serif' }}>
      <AdminPanel onSave={(d) => setAdminData(d)} />
    </div>);

  return (
    <div style={{ fontFamily: font + ', sans-serif', minHeight: '100vh', background: '#faf9ff' }}>
      <Nav
        currentPage={workshopId ? 'catalog' : page}
        setPage={setPage}
        currentUser={currentUser}
        setAuthModal={openAuth}
        setCurrentUser={handleLogout} />

      {/* Pages */}
      {page === 'landing' && <Landing setPage={setPage} setAuthModal={openAuth} heroVariant={heroVariant} />}
      {page === 'catalog' && <Catalog setPage={setPage} setAuthModal={openAuth} currentUser={currentUser} />}
      {workshopId && <WorkshopDetail workshopId={workshopId} setPage={setPage} setAuthModal={openAuth} currentUser={currentUser} setPaymentWorkshop={setPaymentWorkshop} />}
      {page === 'student-dashboard' && (currentUser ? <StudentDashboard currentUser={currentUser} setPage={setPage} setAuthModal={openAuth} /> : <AuthGuard setAuthModal={openAuth} setPage={setPage} />)}
      {page === 'teacher-dashboard' && (currentUser ? <TeacherDashboard currentUser={currentUser} setPage={setPage} /> : <AuthGuard setAuthModal={openAuth} setPage={setPage} />)}
      {page === 'faq' && <FAQPage setPage={setPage} setAuthModal={openAuth} />}
      {page === 'about' && <AboutPage setPage={setPage} setAuthModal={openAuth} />}
      {page === 'how' && <HowPage setPage={setPage} setAuthModal={openAuth} />}

      {/* Footer */}
      <footer style={appStyles.footer}>
        <div style={appStyles.footerInner}>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 8 }}>
            <div style={{ width: 32, height: 32, borderRadius: 10, background: 'linear-gradient(135deg,#7C6FCD,#9B8FE0)', color: 'white', fontWeight: 800, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>А</div>
            <div style={{ fontWeight: 700, color: '#2D2640' }}>Азбука нейросетей</div>
          </div>
          <div style={{ fontSize: 13, color: '#c0bad8', marginBottom: 12 }}>Живые воркшопы по нейросетям для тех, кто начинает с нуля</div>
          <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap', fontSize: 13 }}>
            {[['Воркшопы', 'catalog'], ['О проекте', 'about'], ['FAQ', 'faq'], ['Контакты', 'faq']].map(([l, p]) =>
            <button key={l} style={{ background: 'none', border: 'none', color: '#9990b0', cursor: 'pointer', fontSize: 13, padding: 0, fontFamily: 'Nunito,sans-serif' }} onClick={() => setPage(p)}>{l}</button>
            )}
          </div>
          <div style={{ marginTop: 16, fontSize: 12, color: '#d0cadf', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span>© 2025 Азбука нейросетей</span>
            <button style={{ background: 'none', border: '1px solid #c8bfee', borderRadius: 6, color: '#9990b0', cursor: 'pointer', fontSize: 12, padding: '3px 8px', fontFamily: 'Nunito,sans-serif' }} onClick={() => setPage('admin')}>⚙ Управление</button>
          </div>
        </div>
      </footer>

      {/* Auth modal */}
      {authModal &&
      <Auth
        mode={authMode}
        setMode={setAuthMode}
        onClose={() => setAuthModal(null)}
        onLogin={handleLogin} />

      }

      {/* Payment modal */}
      {paymentWorkshop &&
      <Payment
        workshop={paymentWorkshop}
        onClose={() => setPaymentWorkshop(null)}
        onSuccess={() => {
          setPage(currentUser?.type === 'teacher' ? 'teacher-dashboard' : 'student-dashboard');
        }} />

      }

      {/* Tweaks panel */}
      {tweaksVisible &&
      <div style={appStyles.tweaksPanel}>
          <div style={appStyles.tweaksTitle}>Tweaks</div>

          <div style={appStyles.tweaksSection}>Hero — вариант</div>
          {[1, 2, 3].map((v) =>
        <button key={v} style={{ ...appStyles.tweaksBtn, ...(heroVariant === v ? appStyles.tweaksBtnActive : {}) }}
        onClick={() => setHero(v)}>
              {['Светлый (пастель)', 'Тёмный (dark)', 'Центрированный'][v - 1]}
            </button>
        )}

          <div style={{ ...appStyles.tweaksSection, marginTop: 12 }}>Шрифт</div>
          {['Nunito', 'Geologica', 'Onest'].map((f) =>
        <button key={f} style={{ ...appStyles.tweaksBtn, ...(font === f ? appStyles.tweaksBtnActive : {}) }}
        onClick={() => setFontChoice(f)}>
              {f}
            </button>
        )}

          <div style={{ ...appStyles.tweaksSection, marginTop: 12 }}>Быстрый вход</div>
          <button style={appStyles.tweaksBtn} onClick={() => {handleLogin({ name: 'Мария', type: 'student', email: 'm@m.ru' });setPage('student-dashboard');}}>→ Ученик</button>
          <button style={appStyles.tweaksBtn} onClick={() => {handleLogin({ name: 'Катя', type: 'teacher', email: 'k@k.ru' });setPage('teacher-dashboard');}}>→ Преподаватель</button>
          <button style={{ ...appStyles.tweaksBtn, color: '#F5856A' }} onClick={() => {handleLogout();setPage('landing');}}>Выйти</button>
        </div>
      }
    </div>);

};
